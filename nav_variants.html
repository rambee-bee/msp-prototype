<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>하단 네비게이션 모션 3안 비교 — 한화생명 MSP</title>
<style>
  :root {
    --text-body: #272b2f;
    --text-neutral-1: #908f8e;
    --surface-neutral: #ffffff;
    --surface-neutral-2: #f0f0f0;
    --surface-bg: #f5f5f5;
    --shadow-large: 0px 2px 8px rgba(0, 0, 0, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: #e5e5e5;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-body);
    padding: 48px 24px;
  }

  .page-title {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .page-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-neutral-1);
    margin: 0 0 36px;
  }

  .row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 32px;
    overflow-x: auto;
    padding-bottom: 24px;
  }

  .col { flex: none; width: 300px; }
  .col-label {
    text-align: center;
    margin-bottom: 14px;
  }
  .col-label .name { font-size: 15px; font-weight: 700; }
  .col-label .desc { font-size: 12px; color: var(--text-neutral-1); margin-top: 2px; }

  .phone {
    position: relative;
    width: 300px;
    height: 640px;
    background: var(--surface-bg);
    overflow: hidden;
    box-shadow: 0 20px 44px rgba(0, 0, 0, 0.32);
    border-radius: 28px;
    margin: 0 auto;
  }

  .scroll-area {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding-bottom: 100px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-area::-webkit-scrollbar { width: 0; }

  .full-screen-shot { display: block; width: 100%; height: auto; }

  /* ---------- shared button look ---------- */

  @keyframes iconPop {
    0% { transform: scale(1); }
    45% { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  button.pop svg { animation: iconPop 0.38s cubic-bezier(.34, 1.56, .64, 1); }

  .nav-wrap {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 92px;
    pointer-events: none;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-neutral-1);
    cursor: pointer;
    transition: transform 0.12s ease, color 0.18s ease;
  }
  .icon-btn:active { transform: scale(0.88); }
  .icon-btn.active { color: var(--text-body); }
  .icon-btn svg { width: 22px; height: 22px; display: block; margin: 0 auto 2px; }
  .icon-btn span.label { font-size: 12px; }

  .nav-default {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--surface-neutral);
    box-shadow: var(--shadow-large);
    display: flex;
    padding: 10px 0 10px;
    pointer-events: auto;
  }
  .nav-default .icon-btn { flex: 1; padding: 4px 4px; }

  .nav-pill-fade {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 92px;
    background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,.9) 14%, rgba(255,255,255,.9) 100%);
    opacity: 0;
    pointer-events: none;
  }

  .nav-pill {
    position: absolute;
    left: 20px; right: 20px; bottom: 10px;
    background: var(--surface-neutral);
    border-radius: 1000px;
    box-shadow: var(--shadow-large);
    display: flex;
    align-items: center;
    padding: 7px 10px;
    gap: 10px;
    pointer-events: none;
  }
  /* shared: back-btn / categories markup is reused by both the floating
     pill (variant 1 & 3) and the morph shell's pill layer (variant 2) */
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 100px;
    background: var(--surface-neutral-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .back-btn svg { width: 18px; height: 18px; margin: 0; }
  .categories { position: relative; flex: 1; display: flex; justify-content: space-between; }
  .categories .icon-btn { position: relative; z-index: 1; flex: 1; padding: 8px 4px 6px; }
  .cat-indicator {
    position: absolute;
    top: 0; left: 0;
    width: calc(100% / 3);
    height: 100%;
    background: var(--surface-neutral-2);
    border-radius: 1000px;
    transform: translateX(0%);
    transition: transform 0.34s cubic-bezier(.34, 1.56, .64, 1);
    z-index: 0;
  }

  /* ============ variant 1: 왼쪽 언폴드 (clip-path wipe) ============ */

  .v1 .nav-default {
    opacity: 1; transform: translateY(0) scale(1);
    transition: opacity .34s cubic-bezier(.34,1.56,.64,1), transform .34s cubic-bezier(.34,1.56,.64,1);
  }
  .v1.open .nav-default {
    opacity: 0; transform: translateY(6px) scale(.98);
    transition: opacity .14s ease, transform .14s ease;
    pointer-events: none;
  }
  .v1 .nav-pill-fade { transition: opacity .16s ease; }
  .v1.open .nav-pill-fade { opacity: 1; transition: opacity .3s ease .05s; }
  .v1 .nav-pill {
    clip-path: inset(0 100% 0 0 round 1000px);
    transition: clip-path .3s cubic-bezier(.4,0,.2,1);
  }
  .v1.open .nav-pill {
    clip-path: inset(0 0 0 0 round 1000px);
    pointer-events: auto;
    transition: clip-path .42s cubic-bezier(.34,1.56,.64,1);
  }
  .v1 .nav-pill .back-btn .inner,
  .v1 .nav-pill .categories .icon-btn .inner {
    opacity: 0; transition: opacity .14s ease;
  }
  .v1.open .nav-pill .back-btn .inner { opacity: 1; transition: opacity .3s ease .08s; }
  .v1.open .nav-pill .categories .icon-btn:nth-of-type(1) .inner { opacity: 1; transition: opacity .3s ease .14s; }
  .v1.open .nav-pill .categories .icon-btn:nth-of-type(2) .inner { opacity: 1; transition: opacity .3s ease .2s; }
  .v1.open .nav-pill .categories .icon-btn:nth-of-type(3) .inner { opacity: 1; transition: opacity .3s ease .26s; }

  /* ============ variant 2: 모핑 (하나의 셸이 모양을 바꿈) ============ */

  .v2 .morph-shell {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    top: auto;
    height: 64px;
    background: var(--surface-neutral);
    box-shadow: var(--shadow-large);
    border-radius: 0px;
    pointer-events: auto;
    transition: left .42s cubic-bezier(.65,0,.35,1), right .42s cubic-bezier(.65,0,.35,1),
                bottom .42s cubic-bezier(.65,0,.35,1), border-radius .42s cubic-bezier(.65,0,.35,1);
  }
  .v2.open .morph-shell {
    left: 20px; right: 20px; bottom: 14px;
    border-radius: 1000px;
  }
  .v2 .layer {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    transition: opacity .2s ease;
  }
  .v2 .layer-default { opacity: 1; padding: 0 0; }
  .v2 .layer-default .icon-btn { flex: 1; padding: 8px 4px; }
  .v2.open .layer-default { opacity: 0; transition: opacity .16s ease; pointer-events: none; }
  .v2 .layer-pill {
    opacity: 0; pointer-events: none;
    padding: 0 10px; gap: 10px;
    transition: opacity .18s ease .12s;
  }
  .v2.open .layer-pill { opacity: 1; pointer-events: auto; transition: opacity .26s ease .22s; }
  .v2 .nav-pill-fade { transition: opacity .16s ease; }
  .v2.open .nav-pill-fade { opacity: 1; transition: opacity .3s ease .1s; }

  /* ============ variant 3: 팝 (스케일 바운스 크로스페이드) ============ */

  .v3 .nav-default {
    opacity: 1; transform: scale(1);
    transition: opacity .16s ease, transform .16s ease;
  }
  .v3.open .nav-default {
    opacity: 0; transform: scale(.9);
    transition: opacity .12s ease, transform .12s ease;
    pointer-events: none;
  }
  .v3 .nav-pill-fade { transition: opacity .14s ease; }
  .v3.open .nav-pill-fade { opacity: 1; transition: opacity .18s ease; }
  .v3 .nav-pill {
    opacity: 0; transform: scale(.82);
    transition: opacity .14s ease, transform .14s ease;
  }
  .v3.open .nav-pill {
    opacity: 1; transform: scale(1);
    pointer-events: auto;
    transition: opacity .3s cubic-bezier(.34,1.56,.64,1) .08s, transform .4s cubic-bezier(.34,1.56,.64,1) .08s;
  }
</style>
</head>
<body>

<a href="./index.html" style="display:block; text-align:center; font-size:13px; color:var(--text-neutral-1); text-decoration:none; margin-bottom:12px;">← 처음으로</a>
<h1 class="page-title">하단 네비게이션 · 상품 탭 모션 3안</h1>
<p class="page-sub">각 폰의 하단 "상품" 탭을 눌러보면 서로 다른 모션으로 펼쳐집니다</p>

<div class="row">
  <div class="col">
    <div class="col-label">
      <div class="name">1안 · 언폴드 (Unfold)</div>
      <div class="desc">왼쪽(뒤로가기 위치)에서 오른쪽으로 펼쳐짐</div>
    </div>
    <div class="phone v1" data-variant="1">
      <div class="scroll-area">
        <img class="full-screen-shot" src="./image/nav_variants_screen.png" alt="app screen" />
      </div>
      <div class="nav-wrap" data-layout="two-layer"></div>
    </div>
  </div>

  <div class="col">
    <div class="col-label">
      <div class="name">2안 · 모핑 (Morph)</div>
      <div class="desc">막대 자체가 알약 모양으로 변형됨</div>
    </div>
    <div class="phone v2" data-variant="2">
      <div class="scroll-area">
        <img class="full-screen-shot" src="./image/nav_variants_screen.png" alt="app screen" />
      </div>
      <div class="nav-wrap" data-layout="morph"></div>
    </div>
  </div>

  <div class="col">
    <div class="col-label">
      <div class="name">3안 · 팝 (Pop)</div>
      <div class="desc">바가 사라지고 필이 통통 튀며 등장</div>
    </div>
    <div class="phone v3" data-variant="3">
      <div class="scroll-area">
        <img class="full-screen-shot" src="./image/nav_variants_screen.png" alt="app screen" />
      </div>
      <div class="nav-wrap" data-layout="two-layer"></div>
    </div>
  </div>
</div>

  function defaultTabsHTML() {
    return `
      <button class="icon-btn active" data-target="home">${ICONS.home}<span class="label">홈</span></button>
      <button class="icon-btn" data-target="contract">${ICONS.profile}<span class="label">계약</span></button>
      <button class="icon-btn tab-product" data-target="product">${ICONS.cart}<span class="label">상품</span></button>
      <button class="icon-btn" data-target="menu">${ICONS.menu}<span class="label">메뉴</span></button>
    `;
  }

  function pillCategoriesHTML(withInnerWrap) {
    const wrap = (svg, label) => withInnerWrap
      ? `<span class="inner">${svg}<span class="label">${label}</span></span>`
      : `${svg}<span class="label">${label}</span>`;
    return `
      <span class="cat-indicator"></span>
      <button class="icon-btn active" data-category="insurance">${wrap(ICONS.umbrella, '보험')}</button>
      <button class="icon-btn" data-category="finance">${wrap(ICONS.chart, '금융')}</button>
      <button class="icon-btn" data-category="interest">${wrap(ICONS.heart, '관심')}</button>
    `;
  }

  function buildTwoLayer(navWrap) {
    navWrap.innerHTML = `
      <div class="nav-pill-fade"></div>
      <div class="nav-default">${defaultTabsHTML()}</div>
      <div class="nav-pill">
        <button class="back-btn"><span class="inner">${ICONS.back}</span></button>
        <div class="categories">${pillCategoriesHTML(true)}</div>
      </div>
    `;
  }

  function buildMorph(navWrap) {
    navWrap.innerHTML = `
      <div class="nav-pill-fade"></div>
      <div class="morph-shell">
        <div class="layer layer-default">${defaultTabsHTML()}</div>
        <div class="layer layer-pill">
          <button class="back-btn">${ICONS.back}</button>
          <div class="categories">${pillCategoriesHTML(false)}</div>
        </div>
      </div>
    `;
  }

  function wireUp(phone) {
    const navWrap = phone.querySelector('.nav-wrap');
    const layout = navWrap.dataset.layout;
    if (layout === 'morph') buildMorph(navWrap); else buildTwoLayer(navWrap);

    const btnProduct = navWrap.querySelector('.tab-product');
    const btnBack = navWrap.querySelector('.back-btn');
    const defaultButtons = Array.from(navWrap.querySelectorAll('.layer-default .icon-btn, .nav-default .icon-btn'));
    const categoryButtons = Array.from(navWrap.querySelectorAll('.categories .icon-btn'));
    const catIndicator = navWrap.querySelector('.cat-indicator');

    function pop(btn) {
      btn.classList.remove('pop');
      void btn.offsetWidth;
      btn.classList.add('pop');
    }
    function setActive(group, btn) {
      group.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pop(btn);
    }

    btnProduct.addEventListener('click', () => {
      setActive(defaultButtons, btnProduct);
      phone.classList.add('open');
    });
    btnBack.addEventListener('click', () => {
      phone.classList.remove('open');
      setActive(defaultButtons, defaultButtons.find(b => b.dataset.target === 'home'));
    });
    defaultButtons.forEach(btn => {
      if (btn === btnProduct) return;
      btn.addEventListener('click', () => setActive(defaultButtons, btn));
    });
    categoryButtons.forEach((btn, index) => {
      btn.addEventListener('click', () => {
        setActive(categoryButtons, btn);
        catIndicator.style.transform = `translateX(${index * 100}%)`;
      });
    });
  }

  document.querySelectorAll('.phone').forEach(wireUp);
</script>

</body>
</html>
