<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한화생명 - 모바일</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow-x: hidden;
    }
    body {
      position: relative;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; width: 0; height: 0; }

    /* 직접 접근 시 폰 목업 래퍼 */
    html.standalone {
      background: #272B2F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 0;
    }
    html.standalone body {
      width: 390px;
      min-width: 390px;
      max-width: 390px;
      height: calc(100vh - 80px);
      max-height: 1100px;
      border-radius: 42px;
      overflow: hidden;
      overflow-y: auto;
      background: #fff;
      box-shadow:
        0 0 0 13px #1C1C1E,
        0 0 0 14.5px #3A3A3C,
        0 0 0 17px #1C1C1E,
        0 40px 100px rgba(0,0,0,0.7);
      animation: deviceSlideUp 400ms cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
    }
    @keyframes deviceSlideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* standalone 모드에서 하단 탭을 목업 안에 고정 */
    html.standalone .bottom-nav {
      position: sticky;
    }

    .home-image {
      display: block;
      width: 100%;
      height: auto;
      padding-bottom: 80px; /* 하단 네비 높이만큼 여백 */
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      z-index: 100;
      pointer-events: none;
    }
    .bottom-nav img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <img class="home-image" src="./image/app_home.png" alt="한화생명 홈">
  <div class="bottom-nav">
    <img src="./svg/app_navigation.svg" alt="하단 네비게이션">
  </div>
  <script>
    if (window === window.top) {
      document.documentElement.classList.add('standalone');
    }
  </script>
</body>
</html>
