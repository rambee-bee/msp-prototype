<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담하기 | 한화생명</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

.bg-frame {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  border: none; z-index: 0;
}

.dim-overlay {
  position: fixed; inset: 0;
  background: rgba(39, 43, 47, 0.6);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 100;
  animation: fadeIn 220ms ease;
  cursor: pointer;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.popup-wrap {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  pointer-events: none;
}

.popup-img {
  pointer-events: auto;
  width: 744px;
  max-width: 100%;
  max-height: 90vh;
  display: block;
  animation: slideUp 300ms cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
</style>
</head>
<body>

<iframe class="bg-frame" src="main.html" title="background"></iframe>
<div class="dim-overlay" onclick="goBack()"></div>

<div class="popup-wrap">
  <img class="popup-img" src="./image/consult.png" alt="상담하기" onclick="goBack()" style="cursor:pointer;">
</div>

<script>
function goBack() { window.location.href = 'main.html'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') goBack(); });
</script>
</body>
</html>
